name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site content
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout theme
        uses: actions/checkout@v4
        with:
          repository: jiusanzhou/nextjs-starter-zoe-app
          path: theme

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('theme/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install theme dependencies
        working-directory: theme
        run: pnpm install --frozen-lockfile

      - name: Sync git content (me repo)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/jiusanzhou/me.git /tmp/repo-me
          # Copy blog posts from me repo (📖posts/) into site content
          mkdir -p site/content/posts
          find /tmp/repo-me/📖posts -name '*.md' -o -name '*.mdx' | while read f; do
            cp "$f" site/content/posts/
          done
          # Also copy from subdirectories
          find /tmp/repo-me/📖posts -mindepth 2 -name '*.md' -o -name '*.mdx' | while read f; do
            cp "$f" site/content/posts/
          done
          echo "Synced $(ls site/content/posts/ | wc -l) posts from me repo"

      - name: Link site content to theme
        run: |
          # Copy site config
          cp site/zoe-site.yaml theme/zoe-site.yaml

          # Copy content (merge with theme's content if any)
          cp -r site/content/* theme/content/ 2>/dev/null || true

          # Copy public assets
          cp -r site/public/* theme/public/ 2>/dev/null || true

      - name: Build
        working-directory: theme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - name: Add CNAME and .nojekyll
        run: |
          cp site/CNAME theme/out/CNAME
          touch theme/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: theme/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
